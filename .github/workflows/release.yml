name: Release

# Publishes this package to npm via Trusted Publishing (OIDC) -- no long-lived
# NPM_TOKEN. This mirror repo is PUBLIC, so a provenance attestation is generated
# and published. Trusted publishing enables provenance by default; --provenance is
# still passed explicitly on the real publish so the intent is unambiguous.
# dry_run only builds and packs (npm pack --dry-run) -- it validates the build and
# tarball contents locally; OIDC auth and provenance are exercised only by the
# real (dry_run=false) publish.
#
# This file is generated into the mirror by scripts/snapshot-sdk.ps1 in the
# private monorepo (crane-valley/framedash); edit it there, not here.
#
# ONE-TIME OWNER SETUP (required before the first dry_run=false run):
#   On npmjs.com, for THIS package -> Settings -> Trusted Publisher -> add a
#   GitHub Actions publisher:
#     Organization or user : crane-valley
#     Repository           : <this mirror repo, e.g. framedash-cli>
#     Workflow filename    : release.yml
#     Allowed actions      : npm publish
#   (A trusted publisher can only be added to a package that already exists, so
#   the initial 0.1.0 publish was token-based; 0.1.1+ uses OIDC here.)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build + npm pack, no registry write)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing via OIDC

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Refuse to publish from a non-default ref
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::Release must run on main, not $REF"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # OIDC trusted publishing requires Node >= 22.14 and npm >= 11.5.1.
          node-version: "22.14.0"
      - name: Use npm with OIDC support (pinned 11.x line, >= 11.5.1)
        run: npm install -g npm@11.18.0
      # npm install (not ci): the mirror ships no package-lock.json. For cli /
      # mcp-server this resolves @framedash/api-client from the registry (the
      # mirror manifest pins it to an exact version, not the workspace: protocol).
      # Do not run registry package lifecycle scripts in the same job that has
      # id-token: write for npm Trusted Publishing. The mirror packages build
      # from TypeScript only, so dependency postinstall hooks are not required.
      - run: npm install --ignore-scripts
      # Build BEFORE npm publish. npm normalizes package.json (validating that
      # each bin's target file exists) before any publish lifecycle script runs;
      # if dist is absent at that point it silently strips the package bin. So the
      # mirror has no prepack and builds here instead -- dist exists when npm
      # normalizes, and the bin survives.
      - run: npm run build
      - name: Publish via OIDC with provenance
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            # npm pack (not npm publish --dry-run): validates build + tarball
            # contents without the registry round-trip, so it does not fail on an
            # already-published version. Provenance only applies on a real publish.
            echo "DRY RUN: build + pack only, no registry write"
            npm pack --dry-run
          else
            npm publish --provenance --access public
          fi
