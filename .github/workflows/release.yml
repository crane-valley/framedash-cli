name: Release

# Publishes this package to npm via Trusted Publishing (OIDC) -- no long-lived
# NPM_TOKEN. This mirror repo is PUBLIC, so a provenance attestation is generated
# and published. Trusted publishing enables provenance by default; --provenance is
# still passed explicitly on the real publish so the intent is unambiguous.
# dry_run only builds and packs (npm pack --dry-run) -- it validates the build and
# tarball contents locally; OIDC auth and provenance are exercised only by the
# real (dry_run=false) publish.
#
# This file is generated into the mirror by scripts/snapshot-sdk.ps1 in the
# private monorepo (crane-valley/framedash); edit it there, not here.
#
# ONE-TIME OWNER SETUP (required before the first dry_run=false run):
#   On npmjs.com, for THIS package -> Settings -> Trusted Publisher -> add a
#   GitHub Actions publisher:
#     Organization or user : crane-valley
#     Repository           : <this mirror repo, e.g. framedash-cli>
#     Workflow filename    : release.yml
#     Allowed actions      : npm publish
#   (A trusted publisher can only be added to a package that already exists, so
#   the initial 0.1.0 publish was token-based; 0.1.1+ uses OIDC here.)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build + npm pack, no registry write)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing via OIDC

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Refuse to publish from a non-default ref
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::Release must run on main, not $REF"
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # OIDC trusted publishing requires Node >= 22.14 and npm >= 11.5.1.
          node-version: "22.14.0"
      - name: Use npm with OIDC support (pinned 11.x line, >= 11.5.1)
        run: npm install -g npm@11.18.0
      # npm install (not ci): the mirror ships no package-lock.json. For cli /
      # mcp-server this resolves @framedash/api-client from the registry (the
      # mirror manifest pins it to an exact version, not the workspace: protocol).
      # Do not run registry package lifecycle scripts in the same job that has
      # id-token: write for npm Trusted Publishing. The mirror packages build
      # from TypeScript only, so dependency postinstall hooks are not required.
      - run: npm install --ignore-scripts
      # Build BEFORE npm publish. npm normalizes package.json (validating that
      # each bin's target file exists) before any publish lifecycle script runs;
      # if dist is absent at that point it silently strips the package bin. So the
      # mirror has no prepack and builds here instead -- dist exists when npm
      # normalizes, and the bin survives.
      - run: npm run build
      - name: Publish via OIDC with provenance
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            # npm pack (not npm publish --dry-run): validates build + tarball
            # contents without the registry round-trip, so it does not fail on an
            # already-published version. Provenance only applies on a real publish.
            echo "DRY RUN: build + pack only, no registry write"
            npm pack --dry-run
          elif [ "$REPO" = "crane-valley/framedash-mcp-server" ]; then
            # Idempotent publish for the mcp-server mirror ONLY. This mirror has a
            # second, separate publish target (the MCP Registry) after npm, so a
            # first release that publishes to npm but then fails the registry step
            # must be re-runnable -- without this the re-run would abort here on
            # the already-published npm version and never reach the registry
            # steps. Other mirrors deliberately keep npm's duplicate-version
            # failure below, so a missed version bump is caught, not masked.
            NAME=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            # Check output, not exit code: some npm CLI versions exit 0 with
            # empty output when querying a nonexistent version of an existing
            # package, which would falsely trigger the skip branch below.
            PUBLISHED=$(npm view "$NAME@$VER" version 2>/dev/null || true)
            if [ -n "$PUBLISHED" ]; then
              echo "$NAME@$VER already published; skipping npm publish (registry retry path)"
            else
              npm publish --provenance --access public
            fi
          else
            npm publish --provenance --access public
          fi
      # MCP Registry publish. This template is generated verbatim into every npm
      # mirror, so the following steps are gated to the mcp-server mirror only --
      # api-client / cli have no server.json and are not MCP servers. Runs only on
      # a real publish (the registry hosts metadata that must point at an
      # already-published npm version) and reuses this job's id-token: write for
      # OIDC, so no long-lived token is stored.
      - name: Install mcp-publisher (pinned + checksum-verified)
        if: ${{ !inputs.dry_run && github.repository == 'crane-valley/framedash-mcp-server' }}
        env:
          # Pin a fixed release and verify a committed SHA-256 before executing
          # it: this job holds id-token: write, so a replaced/compromised
          # "latest" asset could otherwise mint an OIDC token and publish
          # attacker metadata under the io.github.crane-valley namespace. Bump
          # both values together when upgrading mcp-publisher. linux_amd64
          # matches runs-on: ubuntu-latest.
          MCP_PUBLISHER_VERSION: v1.8.0
          MCP_PUBLISHER_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        if: ${{ !inputs.dry_run && github.repository == 'crane-valley/framedash-mcp-server' }}
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to MCP Registry
        if: ${{ !inputs.dry_run && github.repository == 'crane-valley/framedash-mcp-server' }}
        run: ./mcp-publisher publish
